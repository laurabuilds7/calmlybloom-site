<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />

  <title>calmlybloom</title>
  <meta name="description" content="calmlybloom — coming soon." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="canonical" href="https://calmlybloom.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%9C%BF%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bone:    #ebe3d2;
      --reseda:  #7b8e5f;
      --ebony:   #2b2b26;
      --ebony-soft: #4a4a42;
      --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bone);
      color: var(--ebony);
      font-family: var(--font-display);
      font-weight: 300;
      font-feature-settings: "kern", "liga";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: max(2rem, env(safe-area-inset-top, 0));
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 0));
    }

    main {
      text-align: center;
      max-width: 28rem;
    }

    .brand {
      font-size: clamp(3rem, 12vw, 5.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variation-settings: "opsz" 144;
      margin: 0;
      font-weight: 400;
    }
    .brand .dot { color: var(--reseda); }

    .tagline {
      margin-top: 1.5rem;
      font-style: italic;
      color: var(--ebony-soft);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    footer {
      position: fixed;
      bottom: max(1.25rem, env(safe-area-inset-bottom, 0));
      left: 0;
      right: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      color: var(--ebony-soft);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="brand">calmlybloom<span class="dot">.</span></h1>
    <p class="tagline">An idea taking shape. Back soon.</p>
  </main>
  <footer>© <span id="year">2026</span> calmlybloom · Cape Town</footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
